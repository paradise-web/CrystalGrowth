name: Android Build

on:
  push:
    branches: [ pack_android2 ]
  pull_request:
    branches: [ pack_android2 ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'

    - name: Get dependencies
      run: |
        flutter --version
        flutter pub get --verbose 2>&1
        echo "Dependency resolution completed"

    - name: Build APK
      run: |
        flutter doctor -v
        flutter build apk --debug --verbose

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: crystal-growth-assistant-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30

    - name: Generate build logs
      run: |
        flutter pub get --verbose > pub-get.log 2>&1

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: pub-get.log
        retention-days: 30
