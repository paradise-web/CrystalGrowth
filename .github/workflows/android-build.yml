name: Android Build

on:
  push:
    branches: [ pack_android2 ]
  pull_request:
    branches: [ pack_android2 ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.0'

    - name: Get dependencies
      run: |
        flutter pub get --verbose > pub-get.log 2>&1
        echo "=== Dependency resolution complete ==="
        cat pub-get.log

    - name: Build APK
      run: |
        flutter doctor -v > doctor.log 2>&1
        flutter build apk --debug --verbose > build.log 2>&1
        echo "=== Build complete ==="
        cat build.log

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: crystal-growth-assistant-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          pub-get.log
          doctor.log
          build.log
        retention-days: 30
      if: always()
