name: Build Android APK

on:
  push:
    branches: [ feat/pack_android ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer

      - name: Build APK
        run: |
          buildozer android debug

      - name: Rename APK
        run: |
          apk_files=$(find bin -name "*.apk")
          if [ -n "$apk_files" ]; then
            mv "$apk_files" "bin/crystalAssistant.apk"
            echo "APK renamed to crystalAssistant.apk"
          else
            echo "No APK files found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: crystalAssistant
          path: bin/crystalAssistant.apk
