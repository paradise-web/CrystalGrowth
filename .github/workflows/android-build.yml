name: Build Android APK

on:
  push:
    branches: [ feat/pack_android ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_HOME: ${{ runner.temp }}/android-sdk
      ANDROID_NDK_HOME: ${{ runner.temp }}/android-ndk
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython sh==1.14.3
          sudo apt-get update
          sudo apt-get install -y build-essential git openjdk-17-jdk unzip wget

      - name: Build APK
        run: |
          # 增加重试机制
          for i in {1..3}; do
            buildozer android debug && break || {
              echo "Build failed, retrying ($i/3)..."
              sleep 30
            }
          done

      - name: Rename APK
        run: |
          apk_files=$(find bin -name "*.apk")
          if [ -n "$apk_files" ]; then
            mv "$apk_files" "bin/crystalAssistant.apk"
            echo "APK renamed to crystalAssistant.apk"
          else
            echo "No APK files found"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crystalAssistant
          path: bin/crystalAssistant.apk
