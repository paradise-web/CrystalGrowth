name: Android Build

on:
  push:
    branches: [ pack_android2 ]
  pull_request:
    branches: [ pack_android2 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Download Flutter
      run: |
        wget -O flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.13.0-stable.tar.xz
        tar -xf flutter.tar.xz
        echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: crystal-growth-assistant-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
