name: Android Build

on:
  push:
    branches: [ pack_android2 ]
  pull_request:
    branches: [ pack_android2 ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl git unzip xz-utils zip libglu1-mesa

    - name: Download Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.7.12-stable.tar.xz
        tar -xf flutter_linux_3.7.12-stable.tar.xz
        echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

    - name: Flutter version
      run: flutter --version

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: crystal-growth-assistant-apk
        path: build/app/outputs/flutter-apk/app-debug.apk
        retention-days: 30
